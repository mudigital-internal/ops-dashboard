name: Collect Dashboard Data

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Run data collector
        working-directory: collector
        env:
          POSTHOG_PERSONAL_API_KEY: ${{ secrets.POSTHOG_PERSONAL_API_KEY }}
          POSTHOG_PROJECT_ID: ${{ secrets.POSTHOG_PROJECT_ID }}
          POSTHOG_HOST: https://us.posthog.com
          ALCHEMY_MONAD_URL: ${{ secrets.ALCHEMY_MONAD_URL }}
          ALCHEMY_ETH_URL: ${{ secrets.ALCHEMY_ETH_URL }}
          MONADSCAN_API_KEY: ${{ secrets.MONADSCAN_API_KEY }}
          ETHERSCAN_API_KEY: ${{ secrets.ETHERSCAN_API_KEY }}
        run: node collect.js
      - name: Commit updated data
        run: |
          git config user.name "mu-data-bot"
          git config user.email "data-bot@mudigital.net"
          git add data/dashboard-data.json data/history.json
          git diff --staged --quiet || git commit -m "chore: auto-update dashboard data [$(date -u '+%Y-%m-%d %H:%M UTC')]"
          git push